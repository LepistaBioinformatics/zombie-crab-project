# =============================================================================
# zombie-crab-project -- SELF-CONTAINED compose for DOKPLOY (production/Traefik)
# =============================================================================
# A single, standalone file (base + prod + dokploy already merged in) meant to be
# deployed by Dokploy directly -- NOT layered with -f. Point Dokploy's Compose
# service at THIS repo (Git) so the source is present: mycelium-webapp is BUILT
# here (its API URL is baked at build time from ${MYCELIUM_DOMAIN}) and
# mycelium-gateway mounts ./deploy/dokploy/config.base.toml. Everything else runs
# from published images. All values come from the environment -- set them in
# Dokploy's Environment section (see deploy/dokploy/.env.example for the full list).
#
# Prerequisites (NOT solved by this file):
#   - Dokploy must build from the cloned repo (the ./fungi/* build context and
#     config mount are relative to this file). fungi/* live in THIS repo (not
#     submodules); crab/* stay as published images, so submodules aren't needed.
#   - Edit deploy/dokploy/config.base.toml (domainUrl / allowedOrigins /
#     ►►► REPLACE lines) to your https://${MYCELIUM_DOMAIN} / *_DOMAIN origins.
#   - CRAB_HOST_DATA_ROOT: set to an ABSOLUTE host path. crab-shell-proxy mounts
#     the host Docker socket and spawns sibling picoclaw containers bind-mounting
#     subdirs of this root, which must be pre-seeded with data/templates/<agent>.
#   - dokploy-network is external (Dokploy owns it) and must already exist.
#   - After the FIRST up (base/Postgres has no auto-migration): apply mycelium's
#     postgres/sql/up.sql once against mycelium-postgres -- see README.
#
# Local/dev and the layered workflow are unchanged: docker-compose.yaml (default)
# and docker-compose.prod.yaml still exist and are used as before.
# =============================================================================
name: zombie-crab-project
networks:
  dokploy-network:
    external: true
    name: dokploy-network
  zombie_net:
    driver: bridge
    name: zombie_net
services:
  chat-webapp:
    depends_on:
      chat-webapp-postgres:
        condition: service_healthy
        required: true
      mycelium-gateway:
        condition: service_healthy
        required: true
    environment:
      DATABASE_URL: postgresql://${CHAT_WEBAPP_DB_USER:-chatwebapp}:${CHAT_WEBAPP_DB_PASSWORD:-chatwebapp}@chat-webapp-postgres:5432/${CHAT_WEBAPP_DB_NAME:-chatwebapp}
      MYCELIUM_INTERNAL_URL: http://mycelium-gateway:8080
    image: ghcr.io/lepistabioinformatics/crab-exoskeleton-webapp:${CHAT_WEBAPP_TAG:-latest}
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.zombie-chat.rule=Host(`${CHAT_WEBAPP_DOMAIN}`)
      - traefik.http.routers.zombie-chat.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.zombie-chat.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}
      - traefik.http.services.zombie-chat.loadbalancer.server.port=3000
    networks:
      dokploy-network: null
      zombie_net: null
    restart: unless-stopped
  chat-webapp-postgres:
    environment:
      POSTGRES_DB: ${CHAT_WEBAPP_DB_NAME:-chatwebapp}
      POSTGRES_PASSWORD: ${CHAT_WEBAPP_DB_PASSWORD:-chatwebapp}
      POSTGRES_USER: ${CHAT_WEBAPP_DB_USER:-chatwebapp}
    healthcheck:
      interval: 5s
      retries: 20
      test:
        - CMD-SHELL
        - pg_isready -U ${CHAT_WEBAPP_DB_USER:-chatwebapp}
      timeout: 5s
    image: postgres:16-alpine
    networks:
      zombie_net: null
    restart: unless-stopped
    volumes:
      - source: chat-webapp-postgres-data
        target: /var/lib/postgresql/data
        type: volume
        volume: {}
  crab-shell-proxy:
    environment:
      CRAB_CONTAINER_DATA_ROOT: /data
      CRAB_HOST_DATA_ROOT: ${CRAB_HOST_DATA_ROOT:-${PWD}/data}
      CRAB_NETWORK: zombie_net
      CRAB_WEBHOOK_SECRET: ${CRAB_WEBHOOK_SECRET}
      MYC_HERMES_GLM_TOKEN: ${MYC_HERMES_GLM_TOKEN}
      MYC_PICOCLAW_ALPHA_TOKEN: ${MYC_PICOCLAW_ALPHA_TOKEN}
      MYC_PICOCLAW_BETA_TOKEN: ${MYC_PICOCLAW_BETA_TOKEN}
      PICOCLAW_ALPHA_API_KEY: ${PICOCLAW_ALPHA_API_KEY}
      PICOCLAW_BETA_API_KEY: ${PICOCLAW_BETA_API_KEY}
      PROXY_GLM_API_KEY: ${PROXY_GLM_API_KEY}
    healthcheck:
      interval: 15s
      retries: 10
      start_period: 10s
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:8080/healthz
      timeout: 5s
    image: ghcr.io/lepistabioinformatics/crab-shell-proxy:${CRAB_SHELL_PROXY_TAG:-latest}
    networks:
      zombie_net: null
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        type: bind
      - type: bind
        source: ${CRAB_HOST_DATA_ROOT:-${PWD}/data}
        target: /data
        bind:
          create_host_path: true
      # Deploy-owned agent catalog, overriding the image's baked config.yaml so
      # operators can customize agents (e.g. drop hermes-glm) without a rebuild.
      - type: bind
        source: ./deploy/dokploy/crab-shell-proxy.config.yaml
        target: /etc/crab-shell-proxy/config.yaml
        read_only: true
  mycelium-gateway:
    depends_on:
      crab-shell-proxy:
        condition: service_healthy
        required: true
      mycelium-postgres:
        condition: service_healthy
        required: true
    environment:
      - MYC_HERMES_GLM_TOKEN=${MYC_HERMES_GLM_TOKEN}
      - MYC_PICOCLAW_ALPHA_TOKEN=${MYC_PICOCLAW_ALPHA_TOKEN}
      - MYC_PICOCLAW_BETA_TOKEN=${MYC_PICOCLAW_BETA_TOKEN}
      - MYC_STANDALONE_BOOTSTRAP_SECRET=${MYC_STANDALONE_BOOTSTRAP_SECRET}
      - MYC_BASE_DATABASE_URL=postgres://${MYC_DB_USER:-mycelium}:${MYC_DB_PASSWORD}@mycelium-postgres:5432/${MYC_DB_NAME:-mycelium}
      - MYC_BASE_HMAC_SECRET=${MYC_BASE_HMAC_SECRET}
      - MYC_BASE_JWT_SECRET=${MYC_BASE_JWT_SECRET}
      - MYC_BASE_TOKEN_SECRET=${MYC_BASE_TOKEN_SECRET}
      - MYC_SMTP_HOST=${MYC_SMTP_HOST:-smtp.gmail.com}
      - MYC_SMTP_PASSWORD=${MYC_SMTP_PASSWORD}
      - MYC_SMTP_USERNAME=${MYC_SMTP_USERNAME}
      - SETTINGS_PATH=/home/config.toml
    healthcheck:
      interval: 15s
      retries: 10
      start_period: 10s
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:8080/health
      timeout: 5s
    hostname: mycelium-gateway
    image: ghcr.io/lepistabioinformatics/mycelium:${MYCELIUM_IMAGE_TAG:-9.0.0-rc.7}
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.zombie-mycelium.rule=Host(`${MYCELIUM_DOMAIN}`)
      - traefik.http.routers.zombie-mycelium.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.zombie-mycelium.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}
      - traefik.http.services.zombie-mycelium.loadbalancer.server.port=8080
    networks:
      dokploy-network: null
      zombie_net: null
    restart: unless-stopped
    volumes:
      - source: mycelium-data
        target: /data
        type: volume
        volume: {}
      - bind:
          create_host_path: true
        read_only: true
        source: ./deploy/dokploy/config.base.toml
        target: /home/config.toml
        type: bind
  mycelium-postgres:
    environment:
      POSTGRES_DB: ${MYC_DB_NAME:-mycelium}
      POSTGRES_PASSWORD: ${MYC_DB_PASSWORD}
      POSTGRES_USER: ${MYC_DB_USER:-mycelium}
    healthcheck:
      interval: 5s
      retries: 20
      test:
        - CMD-SHELL
        - pg_isready -U ${MYC_DB_USER:-mycelium}
      timeout: 5s
    image: postgres:16-alpine
    networks:
      zombie_net: null
    restart: unless-stopped
    volumes:
      - source: mycelium-postgres-data
        target: /var/lib/postgresql/data
        type: volume
        volume: {}
  mycelium-webapp:
    build:
      args:
        - VITE_MYCELIUM_API_URL=https://${MYCELIUM_DOMAIN}
      context: ./fungi/mycelium-webapp
      dockerfile: Dockerfile
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.zombie-webapp.rule=Host(`${MYCELIUM_WEBAPP_DOMAIN}`)
      - traefik.http.routers.zombie-webapp.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.zombie-webapp.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}
      - traefik.http.services.zombie-webapp.loadbalancer.server.port=80
    networks:
      dokploy-network: null
      zombie_net: null
    restart: unless-stopped
volumes:
  chat-webapp-postgres-data:
    name: zombie-crab-project_chat-webapp-postgres-data
  mycelium-data:
    name: zombie-crab-project_mycelium-data
  mycelium-postgres-data:
    name: zombie-crab-project_mycelium-postgres-data
