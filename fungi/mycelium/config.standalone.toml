# ------------------------------------------------------------------------------
# STANDALONE MODE CONFIGURATION -- zombie-crab-project
#
# Adapted from mycelium-monorepo's settings/config.standalone.example.toml:
# zero external runtime dependencies (SQLite instead of Postgres, in-process
# moka cache instead of Redis, stub/file email transport). Routes two
# picoclaw+picoclaw-openai-proxy sidecar pairs ("alpha"/"beta", see
# ../docker-compose.yaml) instead of upstream's single example route.
#
# This is a static file, not a template: the per-instance secrets below use
# mycelium's own field-level env-var secret resolver (`token = { env =
# "VAR_NAME" }`, resolved by myc-api itself at request time via
# SecretResolver<String>, NOT by any templating step in this image) -- see
# the `[[picoclaw-*.secret]]` blocks. Requires mycelium >= 9.0.0-rc.2 (see
# LepistaBioinformatics/mycelium#166 -- older builds only supported `env` one
# level up, on the whole ServiceSecret).
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# CORE CONFIGURATIONS
#
# `tokenSecret` / `hmacSecrets[].secret` / `jwtSecret` below are placeholders:
# standalone mode ignores them and instead resolves (or generates, on first
# boot) real secrets via the OS keyring / an encrypted local file next to the
# SQLite database. Keep them present only because the config format requires
# the keys to exist.
# ------------------------------------------------------------------------------

[core.accountLifeCycle]
domainName = "Zombie Crab (standalone)"
domainUrl = "http://localhost:8080"
tokenExpiration = 3600                                                # 1 hour
noreplyName = "Mycelium"
noreplyEmail = "noreply@localhost"
supportName = "Mycelium"
supportEmail = "support@localhost"
locale = "en-us"
tokenSecret = "replaced-at-boot-by-standalone-secret-resolution"

# Gates the one-time web-based Staff bootstrap flow
# (GET/POST /_adm/instance/bootstrap*, LepistaBioinformatics/mycelium
# commit 8d8933b3, released 9.0.0-rc.4). Absent by default -- setting it is
# what opts an instance into the bootstrap endpoints (they 404
# unconditionally otherwise). Unlike tokenSecret/hmacSecrets/jwtSecret
# above, this is a real operator-supplied secret (not autogenerated) and
# must resolve via env, matching every other field-level secret in this
# file -- see docker-compose.yaml's onboarding walkthrough for the claim
# steps.
staffBootstrapSecret = { env = "MYC_STANDALONE_BOOTSTRAP_SECRET" }

hmacPrimaryVersion = 1

[[core.accountLifeCycle.hmacSecrets]]
version = 1
secret = "replaced-at-boot-by-standalone-secret-resolution"

[core.webhook]
acceptInvalidCertificates = true
consumeIntervalInSecs = 30
consumeBatchSize = 25
maxAttempts = 5

# ------------------------------------------------------------------------------
# SQLITE DATABASE ADAPTER SETTINGS
# ------------------------------------------------------------------------------

[sqlite]
path = "/data/mycelium.db"

# ------------------------------------------------------------------------------
# EMAIL DISPATCHER POLLING SETTINGS
# ------------------------------------------------------------------------------

[queue]
emailQueueName = "emails"
consumeIntervalInSecs = 15

# ------------------------------------------------------------------------------
# AUTHENTICATION SETTINGS
# ------------------------------------------------------------------------------

[auth.internal.define]
jwtExpiresIn = 43200                                                  # 12 hours
tmpExpiresIn = 300                                                    # 5 minutes
jwtSecret = "replaced-at-boot-by-standalone-secret-resolution"

# ------------------------------------------------------------------------------
# API PORT SETTINGS
# ------------------------------------------------------------------------------

[api]
serviceIp = "0.0.0.0"
servicePort = 8080
serviceWorkers = 1
gatewayTimeout = 60

# http://localhost:8080 -- mycelium-webapp's own dev-mode default, harmless
# to leave in. http://localhost:8081 -- this stack's mycelium-webapp service
# (browser-side SPA, calls the gateway directly -- see docker-compose.yaml).
# This file is baked into the image at build time (not templated), so if you
# change MYCELIUM_WEBAPP_PORT in .env you must also update this value and
# rebuild mycelium-gateway.
allowedOrigins = ["http://localhost:8080", "http://localhost:8081"]

tls = "disabled"

[api.cache]
jwksTtl = 3600 # 1 hour
emailTtl = 30   # 2 minutes
profileTtl = 30 # 2 minutes

[api.logging]
level = "warn,mycelium_base=info,myc_api=info,myc_config=info,myc_core=info,myc_http_tools=info,actix_web=info,myc_notifier=info,myc_diesel_sqlite=info,myc_moka_cache=info"
format = "ansi"
target = "stdout"

# ------------------------------------------------------------------------------
# API GATEWAY ROUTE CONFIGURATION
#
# Two named services -- one per agent (alpha/beta) -- BOTH pointing at the same
# downstream, crab-shell-proxy:8080, over the compose-internal `zombie_net`
# network. crab-shell-proxy tells the agents apart via the
# x-mycelium-service-name header mycelium injects (the service key below,
# e.g. "alpha"), since the first path segment is stripped before
# forwarding. It then spawns/reuses one bare picoclaw container per
# (agent, user) and speaks the Pico Protocol to it. crab-shell-proxy also
# validates the `Authorization: Bearer <token>` mycelium injects here against
# the addressed agent's configured token, so a request reaching it directly
# (bypassing mycelium) without that header is rejected too.
#
# mycelium's router takes the *first path segment* of the request as the
# service name (adapters/mem_db/src/repositories/shared.rs::extract_path_parts)
# and matches everything after it against `path` below -- so callers must hit
# /alpha/... and /beta/... (the literal TOML service keys),
# NOT /alpha/... or /beta/....
#
# `token = { env = "VAR_NAME" }` is the field-level env resolver fixed in
# LepistaBioinformatics/mycelium#166 (SecretResolver<String>, released in
# 9.0.0-rc.2) -- myc-api resolves just the token from that env var at
# request time, so headerName/prefix stay inline here instead of having to
# be duplicated inside a JSON secret blob.
#
# `healthCheckPath = "/healthz"` (not "/v1/models"): mycelium's health-check
# dispatcher issues a plain unauthenticated GET
# (services_health_dispatcher/check_single_host_health.rs), so pointing it
# at an auth-gated route like /v1/models always fails with "Unable to
# perform the health check" (every attempt gets a 401, which the dispatcher
# doesn't treat as a real error, so it falls through all retries with
# neither a response nor an error recorded). picoclaw-openai-proxy's
# /healthz is intentionally unauthenticated and also proxies picoclaw's own
# /health, so one check covers both.
#
# `group = { protectedByRoles = [{ name = "<instance>" }] }`
# (M3, role-scoped access -- see .specs/project/ROADMAP.md/STATE.md AD-008):
# each instance's three paths require a guest-role named after the instance
# itself ("alpha"/"beta"). Declaring these roles here is enough for mycelium
# to auto-create them at boot (propagate_declared_roles_to_storage_engine,
# ports/api/src/main.rs "Propagate declared roles to the SQL database") --
# no manual role creation needed. What's still manual (M3, not done by this
# config alone): Staff -> tenant -> subscription -> guest-invite chain to
# actually grant an account one of these roles; until an account holds the
# matching guest-role, every request 403s ("User does not have permission to
# perform this action" -- fetch_and_inject_profile_from_token_to_forward.rs).
#
# This flips the header contract picoclaw-openai-proxy relies on:
# "authenticated" injected the caller's verified email as a plain
# x-mycelium-email header (check_credentials_with_multi_identity_provider).
# "protectedByRoles" instead calls fetch_and_inject_profile_from_token_to_forward,
# which injects the full account Profile as x-mycelium-profile -- JSON,
# zstd-compressed, base64-encoded (compress_and_encode_profile_to_base64).
# picoclaw-openai-proxy's server.js was updated to decode this and pull the
# principal owner's email from `profile.owners` instead of reading a plain
# header -- see that file's own comments. The caller still can't declare
# "I'm someone else": mycelium builds this header server-side from the
# verified token, same guarantee "authenticated" gave via x-mycelium-email.
# ------------------------------------------------------------------------------

[api.services]

[[alpha]]
# NOT `proxyAddress`: that field means "route through this generic
# forward-proxy" (mycelium embeds the real target URL as a path suffix on
# it -- see Service::proxy_address's own doc comment and
# ports/api/src/router/initialize_downstream_request.rs), a different
# concept from "this is my sidecar, send requests to it directly".
# picoclaw-openai-proxy is a plain HTTP service (not a path-embedding
# forward proxy), so it must be `host`, not `proxyAddress` -- confirmed
# empirically: `proxyAddress` produced "invalid format" 500s on every
# /v1/chat/completions call.
host = "crab-shell-proxy:8080"
protocol = "http"
healthCheckPath = "/healthz"
discoverable = true
serviceType = "rest-api"
isContextApi = false
openapiPath = "/doc/openapi.json"
capabilities = ["chat"]
description = "PicoClaw agent 'alpha' - an OpenAI-compatible personal chat agent. Each user gets an isolated container; send chat via POST /v1/chat/completions."

[[alpha.secret]]
name = "alpha-authorization-header"
authorizationHeader = { headerName = "Authorization", prefix = "Bearer", token = { env = "MYC_PICOCLAW_ALPHA_TOKEN" } }

[[alpha.path]]
group = { protectedByRoles = [{ name = "alpha", permission = "write" }] }
path = "/v1/chat/completions"
secretName = "alpha-authorization-header"
acceptInsecureRouting = true
methods = ["POST"]

[[alpha.path]]
group = { protectedByRoles = [{ name = "alpha" }] }
path = "/v1/models"
secretName = "alpha-authorization-header"
acceptInsecureRouting = true
methods = ["GET"]

[[alpha.path]]
group = { protectedByRoles = [{ name = "alpha" }] }
path = "/v1/sessions/history"
secretName = "alpha-authorization-header"
acceptInsecureRouting = true
methods = ["GET"]

[[alpha.path]]
# Session linkage (conversation-enrichment feature): resolves the sessionKey +
# picoclaw on-disk file basename for a conversation. Read-only metadata, gated
# like /v1/sessions/history (role name, no write permission).
group = { protectedByRoles = [{ name = "alpha" }] }
path = "/v1/sessions/resolve"
secretName = "alpha-authorization-header"
acceptInsecureRouting = true
methods = ["GET"]

[[alpha.path]]
# Discovery (workspace-selection feature) is agent-agnostic: it returns ALL of
# the caller's licensed subscriptions (across roles), and the client must reach
# it BEFORE it knows which role it holds -- so it is `protected` (any resolvable
# member), NOT role-gated. The proxy ignores the injected service-name here and
# returns only the caller's own licensed_resources. Registered under both agents
# for symmetry; either works for any member.
group = "protected"
path = "/v1/subscriptions"
secretName = "alpha-authorization-header"
acceptInsecureRouting = true
methods = ["GET"]

[[alpha.path]]
# Secret injection (agent-customization feature): per-(user, agent), role-gated
# with write (injecting is a write; GET/DELETE also gated the same, a member only
# ever touches their own store). Values are write-only over the API.
group = { protectedByRoles = [{ name = "alpha", permission = "write" }] }
path = "/v1/secrets"
secretName = "alpha-authorization-header"
acceptInsecureRouting = true
methods = ["GET", "POST", "DELETE"]

[[alpha.path]]
# Media upload (media-upload feature): stores a file in the caller's workspace,
# role-gated with write (same chain as chat). POST multipart only.
group = { protectedByRoles = [{ name = "alpha", permission = "write" }] }
path = "/v1/media"
secretName = "alpha-authorization-header"
acceptInsecureRouting = true
methods = ["GET", "POST", "DELETE"]

[[alpha.path]]
# Workspace memory (conversation-enrichment): the user edits MEMORY_CUSTOM.md at
# the workspace root, write-gated like /v1/media. GET reads it, PUT replaces it.
group = { protectedByRoles = [{ name = "alpha", permission = "write" }] }
path = "/v1/memory"
secretName = "alpha-authorization-header"
acceptInsecureRouting = true
methods = ["GET", "PUT"]

# admin-shared-content (admin-shared-content feature): hierarchical
# authority-over-target ops. Registered as `protected` (any resolvable member) —
# NOT role-gated — because the caller's ADMIN tier (tenant/subscription/instance)
# is resolved in-proxy from the injected profile, not from a guest role. The
# secretName injects the bearer token so the proxy's resolveAgent anti-bypass
# still applies. There is deliberately NO /v1/admin/users/files/content route and
# no user-file write route (FR-7 privacy invariant).
[[alpha.path]]
# All /v1/admin/* endpoints share group=protected + this secret; the
# proxy enforces the exact path+method per route. Collapsed to one
# wildcard (mycelium matches via the wildmatch crate).
group = "protected"
path = "/v1/admin/*"
secretName = "alpha-authorization-header"
acceptInsecureRouting = true
methods = ["GET", "POST", "PUT", "DELETE"]

[[beta]]
host = "crab-shell-proxy:8080"
protocol = "http"
healthCheckPath = "/healthz"
discoverable = true
serviceType = "rest-api"
isContextApi = false
openapiPath = "/doc/openapi.json"
capabilities = ["chat"]
description = "PicoClaw agent 'beta' - an OpenAI-compatible personal chat agent. Each user gets an isolated container; send chat via POST /v1/chat/completions."

[[beta.secret]]
name = "beta-authorization-header"
authorizationHeader = { headerName = "Authorization", prefix = "Bearer", token = { env = "MYC_PICOCLAW_BETA_TOKEN" } }

[[beta.path]]
group = { protectedByRoles = [{ name = "beta", permission = "write" }] }
path = "/v1/chat/completions"
secretName = "beta-authorization-header"
acceptInsecureRouting = true
methods = ["POST"]

[[beta.path]]
group = { protectedByRoles = [{ name = "beta" }] }
path = "/v1/models"
secretName = "beta-authorization-header"
acceptInsecureRouting = true
methods = ["GET"]

[[beta.path]]
group = { protectedByRoles = [{ name = "beta" }] }
path = "/v1/sessions/history"
secretName = "beta-authorization-header"
acceptInsecureRouting = true
methods = ["GET"]

[[beta.path]]
# Session linkage (see the alpha /v1/sessions/resolve comment).
group = { protectedByRoles = [{ name = "beta" }] }
path = "/v1/sessions/resolve"
secretName = "beta-authorization-header"
acceptInsecureRouting = true
methods = ["GET"]

[[beta.path]]
# Agent-agnostic discovery (see the alpha /v1/subscriptions comment).
group = "protected"
path = "/v1/subscriptions"
secretName = "beta-authorization-header"
acceptInsecureRouting = true
methods = ["GET"]

[[beta.path]]
# Secret injection (see the alpha /v1/secrets comment).
group = { protectedByRoles = [{ name = "beta", permission = "write" }] }
path = "/v1/secrets"
secretName = "beta-authorization-header"
acceptInsecureRouting = true
methods = ["GET", "POST", "DELETE"]

[[beta.path]]
# Media upload (see the alpha /v1/media comment).
group = { protectedByRoles = [{ name = "beta", permission = "write" }] }
path = "/v1/media"
secretName = "beta-authorization-header"
acceptInsecureRouting = true
methods = ["GET", "POST", "DELETE"]

[[beta.path]]
# Workspace memory (see the alpha /v1/memory comment).
group = { protectedByRoles = [{ name = "beta", permission = "write" }] }
path = "/v1/memory"
secretName = "beta-authorization-header"
acceptInsecureRouting = true
methods = ["GET", "PUT"]

# admin-shared-content (see the alpha /v1/admin comment). `protected`,
# tier resolved in-proxy; no user-file content/write route (FR-7).
[[beta.path]]
# All /v1/admin/* endpoints share group=protected + this secret; the
# proxy enforces the exact path+method per route. Collapsed to one
# wildcard (mycelium matches via the wildmatch crate).
group = "protected"
path = "/v1/admin/*"
secretName = "beta-authorization-header"
acceptInsecureRouting = true
methods = ["GET", "POST", "PUT", "DELETE"]

# ------------------------------------------------------------------------------
# hermes-glm: a Nous Research hermes-agent instance (harness = "hermes" in
# crab-shell-proxy/config.yaml), routed to the same crab-shell-proxy downstream.
# crab-shell-proxy tells it apart via x-mycelium-service-name = "hermes-glm" and
# drives the container over its OpenAI-compatible API server (:8642) instead of
# the Pico Protocol. Same auth/role contract as the picoclaw services above: the
# "hermes-glm" guest-role is auto-declared here; granting it to an account still
# needs the Staff -> tenant -> subscription -> guest-invite chain (M3).
# ------------------------------------------------------------------------------

[[hermes-glm]]
host = "crab-shell-proxy:8080"
protocol = "http"
healthCheckPath = "/healthz"
discoverable = true
serviceType = "rest-api"
isContextApi = false
openapiPath = "/doc/openapi.json"
capabilities = ["chat"]
description = "Hermes-agent (Nous Research, GLM via z.ai) - an OpenAI-compatible personal chat agent. Each user gets an isolated container; send chat via POST /v1/chat/completions."

[[hermes-glm.secret]]
name = "hermes-glm-authorization-header"
authorizationHeader = { headerName = "Authorization", prefix = "Bearer", token = { env = "MYC_HERMES_GLM_TOKEN" } }

[[hermes-glm.path]]
