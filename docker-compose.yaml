# =============================================================================
# zombie-crab-project -- two PicoClaw instances behind a Mycelium API gateway
# =============================================================================
# Topology (fixed to `gateway` mode -- the only mode that exposes the Pico
# Protocol WS channel the OpenAI-compat proxy talks to):
#
#   mycelium-gateway (standalone, :8080, published)
#     |-- /picoclaw-alpha/v1/*  --> picoclaw-alpha-proxy:8787  --> picoclaw-alpha:18790
#     `-- /picoclaw-beta/v1/*   --> picoclaw-beta-proxy:8787   --> picoclaw-beta:18790
#
# mycelium routes by first path segment == the TOML service key (see
# mycelium/config.standalone.toml), so it's /picoclaw-alpha/... and
# /picoclaw-beta/..., not /alpha/... or /beta/....
#
# picoclaw-* and picoclaw-*-proxy publish no host ports -- mycelium-gateway is
# the single entry point, reachable only through it.
#
# Two more services sit alongside this for human use (not required for the
# curl walkthrough below): chat-webapp (:3000, a BFF test client -- signin +
# instance picker + chat) and mycelium-webapp (:8081, the official Mycelium
# admin UI, its own browser-side SPA). See
# .specs/features/mycelium-chat-webapp/design.md.
#
# First run (per instance, before `up -d`):
#   docker compose run --rm picoclaw-alpha   # onboard, generate config.json, then exits
#   $EDITOR data/alpha/config.json           # set agents.defaults.provider/model_name
#                                             # (must match a model_list entry) and
#                                             # channel_list.pico.enabled = true
#   $EDITOR data/alpha/.security.yml          # create it; add model_list.<model_name>.api_keys and:
#                                             #   channels:
#                                             #     pico:
#                                             #       settings:
#                                             #         token: "<random-token>"
#                                             # NOTE: despite picoclaw's own docs showing a
#                                             # flat `pico: token: ...` shape, only the
#                                             # nested `pico: settings: token: ...` form is
#                                             # actually picked up by the running binary
#                                             # (verified empirically -- flat form silently
#                                             # leaves the channel disabled, no error logged).
#   # repeat for data/beta/...
#   cp .env.example .env && $EDITOR .env                     # set MYC_PICOCLAW_*_TOKEN to match
#   docker compose up -d
#   # editing data/*/config.json or .security.yml after containers are already running
#   # requires `docker compose restart picoclaw-alpha picoclaw-beta` (and the *-proxy
#   # services, to reconnect) -- bind-mounted file edits are NOT picked up by `up -d`
#   # alone unless the container is actually recreated/restarted.
# =============================================================================

networks:
  zombie_net:
    driver: bridge

x-picoclaw-image: &picoclaw-image ${PICOCLAW_IMAGE:-docker.io/sipeed/picoclaw:latest}

x-picoclaw-common: &picoclaw-common
  image: *picoclaw-image
  restart: unless-stopped
  init: true
  networks:
    - zombie_net
  healthcheck:
    test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:18790/health"]
    interval: 30s
    timeout: 5s
    retries: 5
    start_period: 20s

services:
  picoclaw-alpha:
    <<: *picoclaw-common
    environment:
      TZ: ${PICOCLAW_TZ:-UTC}
      PICOCLAW_GATEWAY_HOST: 0.0.0.0
      PICOCLAW_LOG_LEVEL: ${PICOCLAW_LOG_LEVEL:-}
    volumes:
      - ${PICOCLAW_ALPHA_DATA_DIR:-./data/alpha}:/root/.picoclaw

  picoclaw-alpha-proxy:
    build:
      context: ./picoclaw-openai-proxy
    restart: unless-stopped
    networks:
      - zombie_net
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      PICOCLAW_WS_URL: ws://picoclaw-alpha:18790/pico/ws
      PICOCLAW_SECURITY_YML: /root/.picoclaw/.security.yml
      # Same value as mycelium's picoclaw-alpha-authorization-header token
      # (see mycelium/config.standalone.toml) -- rejects any request that
      # reaches this sidecar without mycelium's injected header.
      PROXY_API_KEY: ${MYC_PICOCLAW_ALPHA_TOKEN}
    volumes:
      - ${PICOCLAW_ALPHA_DATA_DIR:-./data/alpha}:/root/.picoclaw:ro
    depends_on:
      picoclaw-alpha:
        condition: service_healthy
    healthcheck:
      # /healthz is unauthenticated on purpose and also proxies picoclaw's
      # own /health -- this is the same path mycelium-gateway polls (see
      # mycelium/config.standalone.toml's healthCheckPath).
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  picoclaw-beta:
    <<: *picoclaw-common
    environment:
      TZ: ${PICOCLAW_TZ:-UTC}
      PICOCLAW_GATEWAY_HOST: 0.0.0.0
      PICOCLAW_LOG_LEVEL: ${PICOCLAW_LOG_LEVEL:-}
    volumes:
      - ${PICOCLAW_BETA_DATA_DIR:-./data/beta}:/root/.picoclaw

  picoclaw-beta-proxy:
    build:
      context: ./picoclaw-openai-proxy
    restart: unless-stopped
    networks:
      - zombie_net
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      PICOCLAW_WS_URL: ws://picoclaw-beta:18790/pico/ws
      PICOCLAW_SECURITY_YML: /root/.picoclaw/.security.yml
      PROXY_API_KEY: ${MYC_PICOCLAW_BETA_TOKEN}
    volumes:
      - ${PICOCLAW_BETA_DATA_DIR:-./data/beta}:/root/.picoclaw:ro
    depends_on:
      picoclaw-beta:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backs mycelium-gateway in base mode -- separate from chat-webapp-postgres
  # (that one is chat-webapp's own conversation-metadata table; this one is
  # Mycelium's actual account/tenant/guest-role database). See
  # .specs/project/STATE.md AD-003/AD-006 for why base mode exists at all:
  # `myc-cli accounts create-seed-account` (the only way to create the first
  # Staff account) is hardcoded to Postgres, no SQLite path.
  mycelium-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - zombie_net
    environment:
      POSTGRES_USER: ${MYC_POSTGRES_SUPERUSER:-mycelium}
      POSTGRES_PASSWORD: ${MYC_POSTGRES_SUPERUSER_PASSWORD:-mycelium}
      POSTGRES_DB: ${MYC_POSTGRES_DB:-mycelium}
    volumes:
      - mycelium-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MYC_POSTGRES_SUPERUSER:-mycelium}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Local SMTP catcher -- base mode has no stub/file transport (that's a
  # `standalone`-only Cargo feature), real SMTP is mandatory for magic-link
  # email once mycelium-gateway leaves standalone mode. Web UI on :8025 to
  # read what was "sent" instead of asking for real SMTP credentials.
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    networks:
      - zombie_net
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      # Required -- verified empirically: mycelium's SmtpTransport::relay()
      # (lettre) negotiates TLS immediately on connect, so Mailpit's default
      # plaintext :1025 listener fails with "wrong version number" (SSL
      # routines). A self-signed cert (mailpit/tls.{crt,key}, gitignored) is
      # enough since myc-api's SMTP client doesn't verify the chain.
      MP_SMTP_TLS_CERT: /mailpit-tls/tls.crt
      MP_SMTP_TLS_KEY: /mailpit-tls/tls.key
    volumes:
      - ./mailpit:/mailpit-tls:ro

  mycelium-gateway:
    build:
      context: ./mycelium
      dockerfile: Dockerfile.base
      args:
        MYCELIUM_GIT_REF: ${MYCELIUM_GIT_REF:-a1981ecdf16b78e9ffeb28bb2cd9bbff427a88ff}
    restart: unless-stopped
    networks:
      - zombie_net
    ports:
      - "${MYCELIUM_PORT:-8080}:8080"
    environment:
      # mycelium/config.base.toml references all of these directly via its
      # field-level `{ env = "..." }` secret resolver -- real values live
      # only in .env (gitignored), never in the committed TOML.
      MYC_PICOCLAW_ALPHA_TOKEN: ${MYC_PICOCLAW_ALPHA_TOKEN}
      MYC_PICOCLAW_BETA_TOKEN: ${MYC_PICOCLAW_BETA_TOKEN}
      MYC_BASE_TOKEN_SECRET: ${MYC_BASE_TOKEN_SECRET}
      MYC_BASE_HMAC_SECRET: ${MYC_BASE_HMAC_SECRET}
      MYC_BASE_JWT_SECRET: ${MYC_BASE_JWT_SECRET}
      MYC_BASE_DATABASE_URL: ${MYC_BASE_DATABASE_URL}
    depends_on:
      picoclaw-alpha-proxy:
        condition: service_healthy
      picoclaw-beta-proxy:
        condition: service_healthy
      mycelium-postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      # Mycelium's own unauthenticated liveness endpoint (ports/api/src/rest/
      # index/heath_check_endpoints.rs) -- needed so chat-webapp/mycelium-webapp
      # below can depend on this service being actually up, not just started.
      # Plain GET, not `--spider` (HEAD): the route only handles GET and
      # rejects HEAD with 400 "Request path does not match any service"
      # (verified empirically -- same error text the path router uses for an
      # actually-unmatched proxied route, easy to misread as a routing bug).
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Conversation metadata for chat-webapp (session_id, agent, title,
  # timestamps) -- owned by the signed-in account's email, not the browser.
  # Deliberately separate from Mycelium's own account model/database: this
  # is just chat-webapp's own small table, not a step towards migrating
  # mycelium-gateway off standalone/SQLite (see STATE.md AD-003/AD-006 for
  # why that migration was deferred).
  chat-webapp-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - zombie_net
    environment:
      POSTGRES_USER: ${CHAT_WEBAPP_DB_USER:-chatwebapp}
      POSTGRES_PASSWORD: ${CHAT_WEBAPP_DB_PASSWORD:-chatwebapp}
      POSTGRES_DB: ${CHAT_WEBAPP_DB_NAME:-chatwebapp}
    volumes:
      - chat-webapp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CHAT_WEBAPP_DB_USER:-chatwebapp}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # BFF test client (magic-link signin, instance picker, chat) -- see
  # .specs/features/mycelium-chat-webapp/design.md. Talks to mycelium-gateway
  # server-side only, over the internal network; the browser never holds the
  # Mycelium JWT (see AD-001, context.md).
  chat-webapp:
    build:
      context: ./webapp
    restart: unless-stopped
    networks:
      - zombie_net
    environment:
      MYCELIUM_INTERNAL_URL: http://mycelium-gateway:8080
      DATABASE_URL: postgresql://${CHAT_WEBAPP_DB_USER:-chatwebapp}:${CHAT_WEBAPP_DB_PASSWORD:-chatwebapp}@chat-webapp-postgres:5432/${CHAT_WEBAPP_DB_NAME:-chatwebapp}
    ports:
      - "${CHAT_WEBAPP_PORT:-3000}:3000"
    depends_on:
      mycelium-gateway:
        condition: service_healthy
      chat-webapp-postgres:
        condition: service_healthy

  # Official Mycelium admin UI -- account/tenant/guest-role management.
  # Unlike chat-webapp, this is a pure client-side SPA (no server of its
  # own), so its browser code calls mycelium-gateway directly -- that's why
  # its API URL below is the gateway's *published host port*, not the
  # internal Docker DNS name, and why mycelium-gateway's `allowedOrigins`
  # (config.standalone.toml) has to include this service's own origin.
  mycelium-webapp:
    build:
      context: ./mycelium-webapp
      args:
        VITE_MYCELIUM_API_URL: http://localhost:${MYCELIUM_PORT:-8080}
    restart: unless-stopped
    networks:
      - zombie_net
    ports:
      - "${MYCELIUM_WEBAPP_PORT:-8081}:80"

volumes:
  mycelium-postgres-data:
  chat-webapp-postgres-data:
