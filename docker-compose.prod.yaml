# =============================================================================
# zombie-crab-project -- PRODUCTION override (OPT-IN, not used by default)
# =============================================================================
# Switches the stack from the local default (mycelium standalone/SQLite, every
# service built from source) to production posture:
#   - mycelium-gateway runs the OFFICIAL published image in base/Postgres mode
#     (no local build), config mounted from fungi/mycelium/config.base.toml;
#   - a dedicated mycelium-postgres service backs it;
#   - crab-shell-proxy and chat-webapp run their OFFICIAL published GHCR images
#     (built+pushed by each repo's .github/workflows/release-image.yml);
#   - mycelium-webapp is still BUILT here (it's a static PWA whose API URL is
#     baked at build time, so it can't be a generic prebuilt image -- see
#     docker-compose.dokploy.yaml, which sets its VITE_MYCELIUM_API_URL).
#
# Bring it up (add the dokploy override too for Traefik ingress):
#   docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d
#   docker compose -f docker-compose.yaml -f docker-compose.prod.yaml \
#                  -f docker-compose.dokploy.yaml up -d      # + Traefik
#
# One-time after the FIRST up (base/Postgres has no auto-migration, L-009):
#   docker compose ... exec mycelium-postgres \
#     psql -U "$MYC_DB_USER" -d "$MYC_DB_NAME" -f -   < postgres/sql/up.sql
#   (or run psql from the host against the DB URL) -- see README production section.
#
# All values below come from .env (see its "Production (base/postgres mode)"
# section). `build: !reset null` drops the base file's build so the image is
# PULLED, never built (a plain `image:` alongside `build:` would still build if
# the image were missing locally). `!reset` needs Docker Compose >= v2.24.
# =============================================================================

services:
  # Mycelium's own Postgres. Deliberately separate from chat-webapp-postgres
  # (STATE.md AD-008) -- different database, different lifecycle.
  mycelium-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - zombie_net
    environment:
      POSTGRES_USER: ${MYC_DB_USER:-mycelium}
      POSTGRES_PASSWORD: ${MYC_DB_PASSWORD}
      POSTGRES_DB: ${MYC_DB_NAME:-mycelium}
    volumes:
      - mycelium-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MYC_DB_USER:-mycelium}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mycelium-gateway:
    # Official published image, base/Postgres build (mycelium's default cargo
    # features). No local build.
    build: !reset null
    image: ghcr.io/lepistabioinformatics/mycelium:${MYCELIUM_IMAGE_TAG:-9.0.0-rc.7}
    environment:
      # The official image sets Entrypoint=myc-api but does NOT define
      # SETTINGS_PATH (verified from the image config), so point it at the
      # mounted base-mode config explicitly.
      SETTINGS_PATH: /home/config.toml
      MYC_BASE_DATABASE_URL: postgres://${MYC_DB_USER:-mycelium}:${MYC_DB_PASSWORD}@mycelium-postgres:5432/${MYC_DB_NAME:-mycelium}
      MYC_BASE_TOKEN_SECRET: ${MYC_BASE_TOKEN_SECRET}
      MYC_BASE_HMAC_SECRET: ${MYC_BASE_HMAC_SECRET}
      MYC_BASE_JWT_SECRET: ${MYC_BASE_JWT_SECRET}
      # Gmail SMTP. Port is fixed at 465 (implicit TLS == SmtpTransport::relay())
      # directly in config.base.toml -- it's not an env var (SecretResolver<u16>
      # won't parse a string). host/username/password come from env.
      MYC_SMTP_HOST: ${MYC_SMTP_HOST:-smtp.gmail.com}
      MYC_SMTP_USERNAME: ${MYC_SMTP_USERNAME}
      MYC_SMTP_PASSWORD: ${MYC_SMTP_PASSWORD}
      # MYC_PICOCLAW_*_TOKEN and MYC_STANDALONE_BOOTSTRAP_SECRET are already set
      # on this service by the base compose file and carry over unchanged.
    volumes:
      # Mount the base-mode config over the image's default location. The base
      # file's mycelium-data:/data mount carries over (volumes concatenate).
      - ./fungi/mycelium/config.base.toml:/home/config.toml:ro
    depends_on:
      mycelium-postgres:
        condition: service_healthy

  crab-shell-proxy:
    build: !reset null
    image: ghcr.io/lepistabioinformatics/crab-shell-proxy:${CRAB_SHELL_PROXY_TAG:-latest}

  chat-webapp:
    build: !reset null
    image: ghcr.io/lepistabioinformatics/crab-exoskeleton-webapp:${CHAT_WEBAPP_TAG:-latest}

volumes:
  mycelium-postgres-data:
